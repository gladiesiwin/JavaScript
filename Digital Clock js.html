<!DOCTYPE html>
<html>
<body style="background-color: lightblue;">

<h2>Digital Clock</h2>

<h3 id="clock"></h3>

<script>
setInterval(function() {
    let d = new Date();
    document.getElementById("clock").innerHTML =
        d.toLocaleTimeString();
}, 1000);
</script>

</body>
</html>
